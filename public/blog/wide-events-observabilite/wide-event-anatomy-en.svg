<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Anatomy of a wide event</title>
  <desc id="desc">A request crosses several services and gathers resource, span, log and business context into one structured event.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6 0 12Z" fill="#ffd447"/>
    </marker>
  </defs>
  <rect width="1600" height="900" rx="26" fill="#111"/>
  <rect x="20" y="20" width="1560" height="860" rx="18" fill="url(#grid)" stroke="#f4efe5" stroke-width="4"/>
  <rect x="72" y="64" width="500" height="48" rx="8" fill="#ffd447"/>
  <text x="96" y="98" fill="#111" font-family="Space Grotesk, Arial, sans-serif" font-size="29" font-weight="800">ANATOMY OF A WIDE EVENT</text>
  <text x="72" y="158" fill="#f4efe5" font-family="Epilogue, Arial, sans-serif" font-size="25">Context accumulates during execution. It cannot be rebuilt after the incident.</text>

  <rect x="72" y="262" width="210" height="180" rx="18" fill="#f4efe5"/>
  <circle cx="177" cy="316" r="28" fill="#e22b2b"/>
  <path d="M125 372H229M125 396H203" stroke="#111" stroke-width="12" stroke-linecap="round"/>
  <text x="111" y="480" fill="#ffd447" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800">REQUEST</text>

  <path d="M300 352H820" fill="none" stroke="#ffd447" stroke-width="10" marker-end="url(#arrow)"/>
  <g font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">
    <g transform="translate(380 260)">
      <rect width="150" height="150" rx="24" fill="#e22b2b"/>
      <circle cx="75" cy="55" r="24" fill="#f4efe5"/>
      <path d="M38 105H112" stroke="#111" stroke-width="11" stroke-linecap="round"/>
      <text x="75" y="184" fill="#f4efe5">API</text>
    </g>
    <g transform="translate(570 260)">
      <rect width="150" height="150" rx="24" fill="#2f7ef7"/>
      <circle cx="75" cy="55" r="24" fill="#f4efe5"/>
      <path d="M38 105H112" stroke="#111" stroke-width="11" stroke-linecap="round"/>
      <text x="75" y="184" fill="#f4efe5">PAYMENT</text>
    </g>
    <g transform="translate(760 260)">
      <rect width="150" height="150" rx="24" fill="#2faa67"/>
      <circle cx="75" cy="55" r="24" fill="#f4efe5"/>
      <path d="M38 105H112" stroke="#111" stroke-width="11" stroke-linecap="round"/>
      <text x="75" y="184" fill="#f4efe5">QUEUE</text>
    </g>
  </g>

  <g font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="330" y="540" width="170" height="46" rx="23" fill="#f4efe5"/><text x="355" y="570" fill="#111">service.version</text>
    <rect x="510" y="596" width="145" height="46" rx="23" fill="#ffd447"/><text x="535" y="626" fill="#111">feature.flag</text>
    <rect x="670" y="520" width="130" height="46" rx="23" fill="#f4efe5"/><text x="695" y="550" fill="#111">tenant.id</text>
    <rect x="725" y="640" width="155" height="46" rx="23" fill="#e22b2b"/><text x="750" y="670" fill="#fff">trace_id</text>
  </g>
  <path d="M415 532V430M580 590V430M730 512V430M800 632V430" stroke="#777" stroke-width="3" stroke-dasharray="8 8"/>

  <rect x="1015" y="220" width="500" height="520" rx="24" fill="#f4efe5" stroke="#ffd447" stroke-width="8"/>
  <rect x="1060" y="266" width="410" height="62" rx="10" fill="#111"/>
  <text x="1090" y="307" fill="#fff" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="800">STRUCTURED EVENT</text>
  <g font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="21" font-weight="800">
    <rect x="1060" y="368" width="180" height="58" rx="12" fill="#e22b2b"/><text x="1090" y="405" fill="#fff">RESOURCE</text>
    <text x="1265" y="405" fill="#111">service · version · region</text>
    <rect x="1060" y="452" width="180" height="58" rx="12" fill="#2f7ef7"/><text x="1090" y="489" fill="#fff">SPAN</text>
    <text x="1265" y="489" fill="#111">route · duration · status</text>
    <rect x="1060" y="536" width="180" height="58" rx="12" fill="#2faa67"/><text x="1090" y="573" fill="#fff">CORRELATED LOG</text>
    <text x="1265" y="573" fill="#111">trace_id · error</text>
    <rect x="1060" y="620" width="180" height="58" rx="12" fill="#ffd447"/><text x="1090" y="657" fill="#111">BUSINESS</text>
    <text x="1265" y="657" fill="#111">tenant · flag · outcome</text>
  </g>
  <path d="M915 352H1000" fill="none" stroke="#ffd447" stroke-width="10" marker-end="url(#arrow)"/>
  <text x="72" y="818" fill="#aaa" font-family="Epilogue, Arial, sans-serif" font-size="21">The backend can then aggregate, filter and correlate without requiring every question to be known in advance.</text>
</svg>
