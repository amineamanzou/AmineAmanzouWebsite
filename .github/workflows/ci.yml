name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify WordPress image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_stream(File.read(path)); puts "ok #{path}" }'

      - name: Public repository safety scan
        run: |
          set -euo pipefail
          if grep -RInE \
            --exclude-dir=.git \
            --exclude=ci.yml \
            '(10\.42\.|178\.104\.|37\.187\.|/opt/|/Users/|ops-gw|bastion|k3s|Argo|argo|kubectl|KUBECONFIG|ssh |known_hosts|SOPS|Kopia|WEB_PROD|GHCR_READ|MARIADB_ROOT_PASSWORD|DB_PASSWORD|preprod|cluster|gateway|CIDR|route|the-unreliable-deploy|TheUnreliableInfrastructure)' \
            .; then
            echo "Private infrastructure marker found in public repository content" >&2
            exit 1
          fi

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: false
          push: false
          tags: amineamanzou-website:ci
          build-args: |
            VCS_REF=${{ github.sha }}
