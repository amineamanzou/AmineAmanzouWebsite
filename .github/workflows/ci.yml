name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_stream(File.read(path)); puts "ok #{path}" }'

      - name: Public repository safety scan
        run: |
          set -euo pipefail
          if git grep -I -nE \
            '(10\.42\.|178\.104\.|37\.187\.|/opt/|/Users/|ops-gw|bastion|k3s|Argo|argo|kubectl|KUBECONFIG|ssh |known_hosts|SOPS|Kopia|WEB_PROD|GHCR_READ|MARIADB_ROOT_PASSWORD|DB_PASSWORD|preprod|prod[-_ ]?cluster|preprod[-_ ]?cluster|internal[-_ ]?cluster|cluster[-_ ]?(prod|preprod|internal)|gateway|CIDR|the-unreliable-deploy|TheUnreliableInfrastructure)' \
            -- . \
            ':!.github/workflows/ci.yml' \
            ':!package-lock.json'; then
            echo "Private infrastructure marker found in public repository content" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: Build static site
        run: npm run build

      - name: Review static site
        run: npm run review:site

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: false
          push: false
          tags: amineamanzou-website:ci
          build-args: |
            SITE_URL=https://amineamanzou.fr
            BASE_PATH=/
            VCS_REF=${{ github.sha }}
