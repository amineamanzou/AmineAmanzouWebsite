name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_stream(File.read(path)); puts "ok #{path}" }'

      - name: Public repository safety scan
        run: |
          set -euo pipefail
          if git grep -I -nE \
            '(10\.42\.|178\.104\.|37\.187\.|/opt/|/Users/|ops-gw|bastion|k3s|Argo|argo|kubectl|KUBECONFIG|ssh |known_hosts|SOPS|Kopia|WEB_PROD|GHCR_READ|MARIADB_ROOT_PASSWORD|DB_PASSWORD|preprod|prod[-_ ]?cluster|preprod[-_ ]?cluster|internal[-_ ]?cluster|cluster[-_ ]?(prod|preprod|internal)|gateway[-_ ]?(prod|preprod|internal)|CIDR|the-unreliable-deploy|TheUnreliableInfrastructure)' \
            -- . \
            ':!.github/workflows/ci.yml' \
            ':!package-lock.json'; then
            echo "Private infrastructure marker found in public repository content" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject high or critical production dependency vulnerabilities
        run: npm audit --omit=dev --audit-level=high

      - name: Astro check
        run: npm run check

      - name: Validate content inventory and publication calendar
        run: npm run check:content

      - name: Build static site
        run: npm run build

      - name: Verify browser observability is off by default
        run: npm run check:browser-observability -- --mode=off

      - name: Verify product analytics is off by default
        run: npm run check:product-analytics -- --mode=off

      - name: Review static site
        run: npm run review:site

      - name: Build browser observability contract
        env:
          PUBLIC_BROWSER_OBSERVABILITY_ENABLED: "true"
          PUBLIC_BROWSER_OBSERVABILITY_URL: https://otel-browser-actions.test
          PUBLIC_BROWSER_OBSERVABILITY_API_KEY: browser-public
          PUBLIC_BROWSER_SERVICE_NAME: amineamanzou-frontend
          PUBLIC_BROWSER_SERVICE_VERSION: ${{ github.sha }}
          PUBLIC_BROWSER_SITE_NAME: amineamanzou.fr
          PUBLIC_DEPLOYMENT_ENVIRONMENT: production
        run: npm run build

      - name: Verify browser observability enabled contract
        run: npm run check:browser-observability -- --mode=on

      - name: Exercise privacy-safe browser error actions
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/amineamanzou-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4321/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/amineamanzou-preview.log
              exit 1
            fi
            sleep 1
          done
          npm run review:observability -- \
            --url=http://127.0.0.1:4321/ \
            --endpoint=https://otel-browser-actions.test \
            --version=${{ github.sha }} \
            --service=amineamanzou-frontend \
            --site=amineamanzou.fr \
            --environment=production

      - name: Build product analytics contract
        env:
          PUBLIC_PRODUCT_ANALYTICS_ENABLED: "true"
          PUBLIC_POSTHOG_KEY: phc_0123456789abcdefghijklmnopqrstuvwxyzABCD
          PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          PUBLIC_ANALYTICS_SITE_NAME: amineamanzou.fr
          PUBLIC_SERVICE_VERSION: ${{ github.sha }}
          PUBLIC_DEPLOYMENT_ENVIRONMENT: production
        run: npm run build

      - name: Verify product analytics enabled contract
        run: npm run check:product-analytics -- --mode=on

      - name: Exercise product analytics consent and privacy contract
        env:
          CHROME_PATH: /usr/bin/google-chrome
          PRODUCT_ANALYTICS_QA_URL: http://127.0.0.1:4321/
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/amineamanzou-product-analytics-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4321/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/amineamanzou-product-analytics-preview.log
              exit 1
            fi
            sleep 1
          done
          npm run review:product-analytics

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: false
          push: false
          tags: amineamanzou-website:ci
          build-args: |
            SITE_URL=https://amineamanzou.fr
            BASE_PATH=/
            VCS_REF=${{ github.sha }}
            PUBLIC_BROWSER_OBSERVABILITY_ENABLED=false
            PUBLIC_DEPLOYMENT_ENVIRONMENT=production
            PUBLIC_PRODUCT_ANALYTICS_ENABLED=false
