name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser_observability:
        description: Enable the consent-gated Browser RUM canary in this image
        required: false
        type: boolean
        default: false
      product_analytics:
        description: Enable the consent-gated PostHog product analytics canary in this image
        required: false
        type: boolean
        default: false

concurrency:
  group: production-amineamanzou-website
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/amineamanzou-website

jobs:
  release:
    name: Verify and publish immutable production image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      attestations: write
      artifact-metadata: write
    outputs:
      image: ${{ steps.release.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
      image_ref: ${{ steps.release.outputs.image_ref }}
    steps:
      - name: Checkout app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject high or critical production dependency vulnerabilities
        run: npm audit --omit=dev --audit-level=high

      - name: Astro check
        run: npm run check

      - name: Build static site
        run: npm run build

      - name: Review static site
        run: npm run review:site

      - name: Verify exact enabled canary build contract
        if: inputs.browser_observability
        env:
          PUBLIC_BROWSER_OBSERVABILITY_ENABLED: "true"
          PUBLIC_BROWSER_OBSERVABILITY_URL: ${{ vars.PUBLIC_BROWSER_OBSERVABILITY_URL }}
          PUBLIC_BROWSER_OBSERVABILITY_API_KEY: browser-public
          PUBLIC_BROWSER_SERVICE_NAME: amineamanzou-frontend
          PUBLIC_BROWSER_SERVICE_VERSION: ${{ github.sha }}
          PUBLIC_BROWSER_SITE_NAME: amineamanzou.fr
          PUBLIC_DEPLOYMENT_ENVIRONMENT: production
        run: |
          npm run build
          npm run check:browser-observability -- --mode=on
          npm run review:site

      - name: Verify exact product analytics canary build contract
        if: inputs.product_analytics
        env:
          PUBLIC_PRODUCT_ANALYTICS_ENABLED: "true"
          PUBLIC_POSTHOG_KEY: ${{ vars.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          PUBLIC_ANALYTICS_SITE_NAME: amineamanzou.fr
          PUBLIC_SERVICE_VERSION: ${{ github.sha }}
          PUBLIC_DEPLOYMENT_ENVIRONMENT: production
        run: |
          npm run build
          npm run check:product-analytics -- --mode=on
          npm run review:site

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ github.sha }}
          labels: |
            org.opencontainers.image.title=Amine Amanzou Website
            org.opencontainers.image.description=Static Astro portfolio for amineamanzou.fr
            org.opencontainers.image.url=https://amineamanzou.fr
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA-tagged release candidate
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            SITE_URL=https://amineamanzou.fr
            BASE_PATH=/
            VCS_REF=${{ github.sha }}
            PUBLIC_BROWSER_OBSERVABILITY_ENABLED=${{ inputs.browser_observability && 'true' || 'false' }}
            PUBLIC_BROWSER_OBSERVABILITY_URL=${{ vars.PUBLIC_BROWSER_OBSERVABILITY_URL }}
            PUBLIC_BROWSER_OBSERVABILITY_API_KEY=browser-public
            PUBLIC_BROWSER_SERVICE_NAME=amineamanzou-frontend
            PUBLIC_BROWSER_SITE_NAME=amineamanzou.fr
            PUBLIC_DEPLOYMENT_ENVIRONMENT=production
            PUBLIC_PRODUCT_ANALYTICS_ENABLED=${{ inputs.product_analytics && 'true' || 'false' }}
            PUBLIC_POSTHOG_KEY=${{ vars.PUBLIC_POSTHOG_KEY }}
            PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com
            PUBLIC_ANALYTICS_SITE_NAME=amineamanzou.fr

      - name: Gate the exact pushed digest on critical vulnerabilities
        id: trivy_pushed_digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: table
          severity: CRITICAL
          vuln-type: os,library
          exit-code: "1"

      - name: Scan the exact pushed digest for code scanning
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          vuln-type: os,library
          exit-code: "0"

      - name: Upload Trivy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4.33.0
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: error

      - name: Generate SBOM from the exact pushed digest
        id: image_sbom
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: cyclonedx
          output: image-sbom.cdx.json
          vuln-type: os,library

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: image-sbom-cyclonedx
          path: image-sbom.cdx.json
          if-no-files-found: error

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign pushed digest
        id: cosign_sign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          test -n "${{ steps.push.outputs.digest }}"
          cosign sign --yes "$IMAGE_REF"

      - name: Verify pushed digest signature
        id: cosign_verify
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          cosign verify "$IMAGE_REF" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/\\.github/workflows/deploy-production\\.yml@refs/heads/main$"

      - name: Attest image provenance
        id: attest_provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest image SBOM
        id: attest_sbom
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: image-sbom.cdx.json
          push-to-registry: true

      - name: Verify image provenance attestation
        id: verify_attestation
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          gh attestation verify "oci://${IMAGE_REF}" \
            --repo "${{ github.repository }}" \
            --signer-workflow "${{ github.repository }}/.github/workflows/deploy-production.yml" \
            --source-ref "refs/heads/main" \
            --source-digest "${{ github.sha }}" \
            --predicate-type "https://slsa.dev/provenance/v1"

      - name: Promote the verified digest to main without rebuilding
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          docker buildx imagetools create --tag "${IMAGE_NAME}:main" "$IMAGE_REF"
          docker buildx imagetools inspect "${IMAGE_NAME}:main"

      - name: Release digest
        id: release
        run: |
          test -n "${{ steps.push.outputs.digest }}"
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "Promoted verified digest ${IMAGE_NAME}@${{ steps.push.outputs.digest }}"

      - name: Emit production CI/CD event
        if: always()
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          TRIVY_STATUS: ${{ steps.trivy_pushed_digest.outcome || 'unknown' }}
          COSIGN_STATUS: ${{ steps.cosign_verify.outcome || steps.cosign_sign.outcome || 'unknown' }}
          ATTESTATION_STATUS: ${{ steps.verify_attestation.outcome || steps.attest_provenance.outcome || 'unknown' }}
        run: |
          node scripts/qa/emit-cicd-event.mjs \
            --kind production-deploy \
            --status completed \
            --conclusion "${{ job.status }}" \
            --image-name "${IMAGE_NAME}" \
            --image-digest "${IMAGE_DIGEST}" \
            --image-ref "${IMAGE_REF}" \
            --check trivy="${TRIVY_STATUS}" \
            --check cosign="${COSIGN_STATUS}" \
            --check attestation="${ATTESTATION_STATUS}" \
            --out cicd-event-production.json

      - name: Upload production CI/CD event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: cicd-event-production
          path: cicd-event-production.json
          if-no-files-found: error
